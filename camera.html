<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>SecureView — Camera</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #22c55e; --red: #ef4444; --yellow: #eab308;
      --bg: #09090b; --surface: #18181b; --border: #3f3f46;
      --text: #f4f4f5; --muted: #71717a;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100dvh; display: flex; flex-direction: column; }

    /* ── Setup Screen ── */
    #setupScreen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; text-align: center; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .sub { color: var(--muted); font-size: 14px; line-height: 1.7; margin-bottom: 32px; }
    .field { width: 100%; max-width: 340px; margin-bottom: 14px; text-align: left; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    .field input { width: 100%; padding: 13px 16px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 16px; outline: none; }
    .field input:focus { border-color: var(--green); }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; max-width: 340px; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; background: var(--green); color: #fff; margin-top: 4px; }
    .btn:active { opacity: .85; }
    #errMsg { color: var(--red); font-size: 13px; margin-top: 14px; min-height: 20px; }

    /* ── Camera Screen ── */
    #camScreen { display: none; flex: 1; flex-direction: column; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 13px 18px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .logo { font-weight: 800; font-size: 16px; }
    .logo span { color: var(--green); }
    .room-pill { background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.35); color: var(--green); border-radius: 99px; padding: 4px 13px; font-size: 12px; font-weight: 600; }
    .statusbar { display: flex; align-items: center; gap: 9px; padding: 8px 18px; font-size: 13px; background: var(--bg); border-bottom: 1px solid var(--border); }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background .3s; }
    .dot.waiting { background: var(--yellow); animation: pulse 1.4s ease infinite; }
    .dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.error { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .vid-wrap { flex: 1; background: #000; position: relative; overflow: hidden; min-height: 240px; }
    #localVideo { width: 100%; height: 100%; object-fit: cover; display: block; }
    .badge { position: absolute; top: 12px; left: 12px; display: flex; align-items: center; gap: 6px; background: rgba(239,68,68,.9); color: #fff; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; letter-spacing: .5px; }
    .rec { width: 7px; height: 7px; border-radius: 50%; background: #fff; animation: pulse 1s infinite; }
    .vid-time { position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,.65); padding: 4px 10px; border-radius: 6px; font-size: 12px; font-family: monospace; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--border); }
    .stat { padding: 14px 18px; background: var(--surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .stat:nth-child(even) { border-right: none; }
    .stat-l { font-size: 10px; text-transform: uppercase; letter-spacing: .7px; color: var(--muted); margin-bottom: 4px; }
    .stat-v { font-size: 20px; font-weight: 700; color: var(--green); }
  </style>
</head>
<body>

<!-- ═══════════ SETUP SCREEN ═══════════ -->
<div id="setupScreen">
  <div class="icon">📷</div>
  <h1>Camera Setup</h1>
  <p class="sub">Enter a room name, then tap Start.<br>Keep this page open — it will stream live.</p>

  <div class="field">
    <label>Room Name</label>
    <input id="roomIn" type="text" placeholder="e.g. lab1, corridor-a"
           onkeydown="if(event.key==='Enter')go()" />
  </div>
  <button class="btn" onclick="go()">🎥 Start Camera</button>
  <p id="errMsg"></p>
</div>

<!-- ═══════════ CAMERA SCREEN ═══════════ -->
<div id="camScreen">
  <div class="topbar">
    <div class="logo">🔒 <span>SecureView</span></div>
    <div class="room-pill" id="roomPill">—</div>
  </div>
  <div class="statusbar">
    <div class="dot waiting" id="dot"></div>
    <span id="statusMsg">Initializing…</span>
  </div>
  <div class="vid-wrap">
    <video id="localVideo" autoplay muted playsinline></video>
    <div class="badge"><div class="rec"></div>LIVE</div>
    <div class="vid-time" id="clock"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-l">Room</div><div class="stat-v" id="sRoom">—</div></div>
    <div class="stat"><div class="stat-l">Status</div><div class="stat-v" id="sStatus">—</div></div>
    <div class="stat"><div class="stat-l">Viewers</div><div class="stat-v" id="sViewers">0</div></div>
    <div class="stat"><div class="stat-l">Uptime</div><div class="stat-v" id="sUptime">00:00</div></div>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║   STEP 1 — Paste your Firebase config here (see README)  ║
// ╚══════════════════════════════════════════════════════════╝
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyC7yd2CdX9uqlJsc7qygk2AhkI9xJOQj70",
  authDomain:        "camera-47d67.firebaseapp.com",
  databaseURL:       "https://camera-47d67-default-rtdb.firebaseio.com",
  projectId:         "camera-47d67",
  storageBucket:     "camera-47d67.firebasestorage.app",
  messagingSenderId: "982547074326",
  appId:             "1:982547074326:web:7525f078e52c7b9e8d9437"
};

const RTC_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' }
  ]
};

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

// Auto-start if room is in URL  e.g. camera.html?room=lab1
const urlRoom = new URLSearchParams(location.search).get('room');
if (urlRoom) initCamera(urlRoom);

function go() {
  const room = document.getElementById('roomIn').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '-');
  if (!room) { document.getElementById('errMsg').textContent = '⚠️ Please enter a room name'; return; }
  history.replaceState({}, '', `?room=${room}`);
  initCamera(room);
}

// ─── State ───────────────────────────────────────────────────
let pc, viewerICEQueue = [], viewerICEReady = false, t0;

async function initCamera(room) {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('camScreen').style.display = 'flex';
  document.getElementById('roomPill').textContent = '📍 ' + room;
  document.getElementById('sRoom').textContent = room;
  setStatus('waiting', 'Requesting permissions…');

  // ── 1. Get camera + mic ───────────────────────────────────
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: true
    });
  } catch (e) {
    setStatus('error', '❌ ' + e.message); return;
  }
  document.getElementById('localVideo').srcObject = stream;

  // ── 2. Clocks ─────────────────────────────────────────────
  t0 = Date.now();
  setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);
  setInterval(() => {
    const s = Math.floor((Date.now() - t0) / 1000);
    document.getElementById('sUptime').textContent =
      `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }, 1000);

  // ── 3. Clear old Firebase session ────────────────────────
  await db.ref(`sv/${room}`).remove();

  // ── 4. Create WebRTC peer connection ─────────────────────
  pc = new RTCPeerConnection(RTC_CONFIG);
  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  pc.onicecandidate = ({ candidate }) => {
    if (candidate) db.ref(`sv/${room}/camICE`).push(candidate.toJSON());
  };

  pc.onconnectionstatechange = () => {
    const s = pc.connectionState;
    if (s === 'connected')    { setStatus('live', '🟢 Viewer connected — Streaming live'); document.getElementById('sStatus').textContent = 'LIVE'; document.getElementById('sViewers').textContent = '1'; }
    else if (s === 'connecting') { setStatus('waiting', 'Connecting to viewer…'); }
    else if (s === 'disconnected' || s === 'failed') { setStatus('waiting', 'Viewer disconnected — waiting…'); document.getElementById('sStatus').textContent = 'Idle'; document.getElementById('sViewers').textContent = '0'; }
  };

  // ── 5. Create & store SDP offer ───────────────────────────
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await db.ref(`sv/${room}/offer`).set({ type: offer.type, sdp: offer.sdp });
  setStatus('waiting', '⏳ Waiting for viewer to connect…');
  document.getElementById('sStatus').textContent = 'Waiting';

  // ── 6. Listen for viewer's answer ─────────────────────────
  db.ref(`sv/${room}/answer`).on('value', async snap => {
    const d = snap.val();
    if (!d || pc.currentRemoteDescription) return;
    await pc.setRemoteDescription(new RTCSessionDescription(d));
    viewerICEReady = true;
    for (const c of viewerICEQueue) { try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(_){} }
    viewerICEQueue = [];
  });

  // ── 7. Receive viewer ICE candidates ──────────────────────
  db.ref(`sv/${room}/viewICE`).on('child_added', async snap => {
    const c = snap.val(); if (!c) return;
    if (viewerICEReady) { try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(_){} }
    else viewerICEQueue.push(c);
  });
}

function setStatus(state, msg) {
  document.getElementById('statusMsg').textContent = msg;
  const d = document.getElementById('dot');
  d.className = 'dot ' + state; // waiting / live / error
}
</script>
</body>
</html>
